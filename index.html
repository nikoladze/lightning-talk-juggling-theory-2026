<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Juggling Animation</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="420"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const G             = 1200;   // px/s²
    const VY0           = -800;   // initial upward velocity
    const VX_MAG        = 300;    // horizontal speed magnitude
    const RADIUS        = 18;
    const FLOOR_Y       = 320;    // y where ball is caught/thrown
    const LEFT_THROW_X  = 150;    // left hand throw position
    const RIGHT_THROW_X = 450;    // right hand throw position
    const SCOOP_DUR     = 0.2;   // seconds for the hand-arc phase

    const NUM_BALLS = 9;  // ← change this

    const T_FLIGHT = 2 * Math.abs(VY0) / G;
    const SPACING  = (T_FLIGHT + SCOOP_DUR) / NUM_BALLS;

    function ballColor(i) {
      const hue = (i / NUM_BALLS) * 360;
      return ['#fff', `hsl(${hue},100%,60%)`, `hsl(${hue},100%,28%)`];
    }

    const BALL_DEFS = Array.from({ length: NUM_BALLS }, (_, i) => ({
      x0:    i % 2 === 0 ? LEFT_THROW_X  : RIGHT_THROW_X,
      vx0:   i % 2 === 0 ? +VX_MAG       : -VX_MAG,
      color: ballColor(i),
      delay: i * SPACING,
    }));

    function makeBall(def) {
      return {
        phase: 'waiting',      // 'waiting' | 'flying' | 'scooping'
        timer: -def.delay,
        x: def.x0, y: FLOOR_Y,
        vx: def.vx0, vy: 0,
        color: def.color,
        scoop: null,
      };
    }

    const balls = BALL_DEFS.map(makeBall);

    function launch(ball) {
      ball.phase = 'flying';
      ball.vy = VY0;
    }

    // When the ball lands at (ball.x, FLOOR_Y), start a downward half-circle
    // arc toward the appropriate throw position on this side of the canvas.
    function startScoop(ball) {
      const xLand = ball.x;
      // Which hand catches it — pick the nearest throw point
      const onRight = xLand > (LEFT_THROW_X + RIGHT_THROW_X) / 2;
      const xThrow  = onRight ? RIGHT_THROW_X : LEFT_THROW_X;
      const vxNext  = onRight ? -VX_MAG       : +VX_MAG;

      const cx = (xLand + xThrow) / 2;
      const r  = Math.abs(xThrow - xLand) / 2;
      // goingLeft  (xLand > xThrow): angle 0 → π  (sin peaks at π/2 → dips DOWN)
      // goingRight (xLand < xThrow): angle π → 0  (sin also peaks at π/2 → dips DOWN)
      ball.scoop = { cx, r, goingLeft: xLand > xThrow, xThrow, vxNext, t: 0 };
      ball.phase = 'scooping';
    }

    function updateScoop(ball, dt) {
      const s = ball.scoop;
      s.t += dt / SCOOP_DUR;
      if (s.t >= 1) {
        ball.x     = s.xThrow;
        ball.y     = FLOOR_Y;
        ball.vx    = s.vxNext;
        ball.scoop = null;
        launch(ball);
        return;
      }
      const angle = s.goingLeft ? s.t * Math.PI : Math.PI * (1 - s.t);
      ball.x = s.cx + s.r * Math.cos(angle);
      ball.y = FLOOR_Y + s.r * Math.sin(angle);   // sin ≥ 0 → arcs downward
    }

    function drawBall(x, y, colors) {
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(x - 5, y - 6, 2, x, y, RADIUS);
      grad.addColorStop(0,   colors[0]);
      grad.addColorStop(0.2, colors[1]);
      grad.addColorStop(1,   colors[2]);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    let lastTime = null;

    function loop(timestamp) {
      if (lastTime === null) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      if (dt > 0.05) dt = 0.05;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const ball of balls) {
        if (ball.phase === 'waiting') {
          ball.timer += dt;
          if (ball.timer >= 0) launch(ball);

        } else if (ball.phase === 'flying') {
          ball.vy += G * dt;
          ball.x  += ball.vx * dt;
          ball.y  += ball.vy * dt;
          if (ball.y >= FLOOR_Y) {
            ball.y = FLOOR_Y;
            startScoop(ball);
          }

        } else { // scooping
          updateScoop(ball, dt);
        }

        drawBall(ball.x, ball.y, ball.color);
      }

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
