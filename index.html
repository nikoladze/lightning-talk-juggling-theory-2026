<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Juggling Animation</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 14px;
    }
    canvas { display: block; }
    #controls {
      display: flex;
      gap: 24px;
      align-items: center;
      color: #999;
      font: 13px/1 monospace;
    }
    #controls label { display: flex; align-items: center; gap: 8px; }
    #controls input[type=number], #controls input[type=text] {
      width: 56px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 6px;
      font: inherit;
    }
    #controls input[type=range] {
      width: 130px;
      accent-color: #777;
    }
    #lblHeight { min-width: 52px; }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="840"></canvas>
  <div id="controls">
    <label>Siteswap <input id="inSiteswap" type="text" value="3" style="width:72px"></label>
    <label>Height <input id="inHeight" type="range" min="50" max="620" value="267"></label>
    <span id="lblHeight">267 px</span>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    const G             = 1200;
    let siteswap        = [3];
    let T               = 0.3;   // beat duration, recomputed on restart
    const RADIUS        = 18;
    const FLOOR_Y       = 640;
    const LEFT_THROW_X  = 150;
    const RIGHT_THROW_X = 450;
    const SCOOP_DUR     = 0.2;
    const SCOOP_RADIUS  = 50;   // fixed half-width of the hand arc

    let balls  = [];
    let animId = null;
    let lastTime = null;

    function parseSiteswap(str) {
      str = str.trim();
      if (/[\s,]/.test(str)) return str.split(/[\s,]+/).filter(Boolean).map(Number);
      return str.split('').map(c => '0123456789'.includes(c) ? +c : 0);
    }

    function restart() {
      const raw = document.getElementById('inSiteswap').value;
      siteswap  = parseSiteswap(raw);
      if (!siteswap.length || siteswap.some(isNaN)) siteswap = [3];
      const P    = siteswap.length;
      const sum  = siteswap.reduce((a, b) => a + b, 0);
      const avgN = sum / P;
      const numBalls = Math.round(avgN);

      const height      = parseInt(document.getElementById('inHeight').value);
      document.getElementById('lblHeight').textContent = height + ' px';

      const tFlightRef  = 2 * Math.sqrt(2 * height / G);
      T = (tFlightRef + SCOOP_DUR) / avgN;

      function ballColor(i) {
        const hue = (i / numBalls) * 360;
        return ['#fff', `hsl(${hue},100%,60%)`, `hsl(${hue},100%,28%)`];
      }

      // Collect first numBalls beats that have non-zero throw values
      const ballBeats = [];
      for (let b = 0; ballBeats.length < numBalls; b++) {
        if (siteswap[b % P] > 0) ballBeats.push(b);
      }

      balls = Array.from({ length: numBalls }, (_, i) => {
        const beat   = ballBeats[i];
        const onLeft = beat % 2 === 0;
        return {
          phase:     'waiting',
          timer:     -(beat * T),
          x:         onLeft ? LEFT_THROW_X : RIGHT_THROW_X,
          y:         FLOOR_Y,
          vx:        0,
          vy:        0,
          vy0:       0,
          color:     ballColor(i),
          beatIndex: beat,  // beat at which this ball's next scoop completes (= its next throw)
          scoop:     null,
        };
      });
      lastTime = null;
      if (animId) cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    function launch(ball) {
      ball.phase = 'flying';
      ball.vy = ball.vy0;
    }

    function startScoop(ball) {
      const onLeft    = ball.x <= (LEFT_THROW_X + RIGHT_THROW_X) / 2;
      const xThrow    = onLeft ? LEFT_THROW_X : RIGHT_THROW_X;
      const goingLeft = !onLeft;
      const cx        = goingLeft ? xThrow + SCOOP_RADIUS : xThrow - SCOOP_RADIUS;
      ball.scoop = { cx, r: SCOOP_RADIUS, goingLeft, xThrow, t: 0 };
      ball.phase = 'scooping';
    }

    function updateScoop(ball, dt) {
      const s = ball.scoop;
      s.t += dt / SCOOP_DUR;
      if (s.t >= 1) {
        // Advance past any 0-valued beats (shouldn't occur in valid siteswap)
        let safety = 0;
        while (siteswap[ball.beatIndex % siteswap.length] === 0 && safety++ < siteswap.length) {
          ball.beatIndex++;
        }
        const throwVal  = siteswap[ball.beatIndex % siteswap.length];
        const isEven    = throwVal % 2 === 0;
        const tFlight   = Math.max(0.01, throwVal * T - SCOOP_DUR);
        const catchDist = isEven ? 2 * SCOOP_RADIUS : (RIGHT_THROW_X - LEFT_THROW_X + 2 * SCOOP_RADIUS);
        const vxMag     = catchDist / tFlight;
        const onLeft    = s.xThrow === LEFT_THROW_X;
        const vxNext    = isEven ? (onLeft ? -vxMag : +vxMag) : (onLeft ? +vxMag : -vxMag);
        ball.x    = s.xThrow;
        ball.y    = FLOOR_Y;
        ball.vx   = vxNext;
        ball.vy0  = -G * tFlight / 2;
        ball.beatIndex += throwVal;
        ball.scoop = null;
        launch(ball);
        return;
      }
      const angle = s.goingLeft ? s.t * Math.PI : Math.PI * (1 - s.t);
      ball.x = s.cx + s.r * Math.cos(angle);
      ball.y = FLOOR_Y + s.r * Math.sin(angle);
    }

    function drawBall(x, y, colors) {
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(x - 5, y - 6, 2, x, y, RADIUS);
      grad.addColorStop(0,   colors[0]);
      grad.addColorStop(0.2, colors[1]);
      grad.addColorStop(1,   colors[2]);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    function loop(timestamp) {
      if (lastTime === null) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      if (dt > 0.05) dt = 0.05;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const ball of balls) {
        if (ball.phase === 'waiting') {
          ball.timer += dt;
          if (ball.timer >= 0) startScoop(ball);
        } else if (ball.phase === 'flying') {
          ball.vy += G * dt;
          ball.x  += ball.vx * dt;
          ball.y  += ball.vy * dt;
          if (ball.y >= FLOOR_Y) {
            ball.y = FLOOR_Y;
            startScoop(ball);
          }
        } else {
          updateScoop(ball, dt);
        }
        drawBall(ball.x, ball.y, ball.color);
      }

      animId = requestAnimationFrame(loop);
    }

    document.getElementById('inSiteswap').addEventListener('change', restart);
    document.getElementById('inHeight').addEventListener('input', restart);

    restart();
  </script>
</body>
</html>
